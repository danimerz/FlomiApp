name: Build & Deploy Blazor Server App (via Jump Host)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Brahmsnet

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish ./FlomiApp.csproj \
            -c Release \
            --self-contained false \
            -o ./publish \
            -p:TreatWarningsAsErrors=false

      - name: SSH-Key & Konfiguration einrichten
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}
          JUMP_PORT: ${{ secrets.JUMP_PORT }}
          JUMP_USER: ${{ secrets.JUMP_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh

          # Key korrekt schreiben (printf statt echo)
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Key-Format prüfen
          ssh-keygen -l -f ~/.ssh/id_ed25519

          # Jump Host scannen
          ssh-keyscan -p "$JUMP_PORT" "$JUMP_HOST" >> ~/.ssh/known_hosts

          # Zielserver über Jump Host scannen
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$JUMP_PORT" \
            -o StrictHostKeyChecking=no \
            "$JUMP_USER@$JUMP_HOST" \
            "ssh-keyscan -p $SSH_PORT $SSH_HOST" \
            2>/dev/null >> ~/.ssh/known_hosts

          # SSH Config schreiben
          {
            echo "Host jumphost"
            echo "  HostName $JUMP_HOST"
            echo "  User $JUMP_USER"
            echo "  Port $JUMP_PORT"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  StrictHostKeyChecking no"
            echo ""
            echo "Host target"
            echo "  HostName $SSH_HOST"
            echo "  User $SSH_USER"
            echo "  Port $SSH_PORT"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  ProxyJump jumphost"
            echo "  StrictHostKeyChecking no"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -F ~/.ssh/config" \
            ./publish/ \
            target:/var/www/webapp/

      - name: Service neu starten
        run: |
          ssh -F ~/.ssh/config target "sudo systemctl restart flomi"
