name: Build & Deploy Blazor Server App (via Jump Host)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Brahmsnet

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish ./FlomiApp.csproj \
            -c Release \
            --self-contained false \
            -o ./publish \
            -p:TreatWarningsAsErrors=false

      - name: SSH-Key & Konfiguration einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Jump Host scannen
          ssh-keyscan -p ${{ secrets.JUMP_PORT }} ${{ secrets.JUMP_HOST }} >> ~/.ssh/known_hosts

          # Zielserver über Jump Host scannen
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.JUMP_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.JUMP_USER }}@${{ secrets.JUMP_HOST }} \
            "ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }}" \
            2>/dev/null >> ~/.ssh/known_hosts

          # SSH Config schreiben
          {
            echo "Host jumphost"
            echo "  HostName ${{ secrets.JUMP_HOST }}"
            echo "  User ${{ secrets.JUMP_USER }}"
            echo "  Port ${{ secrets.JUMP_PORT }}"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo ""
            echo "Host target"
            echo "  HostName ${{ secrets.SSH_HOST }}"
            echo "  User ${{ secrets.SSH_USER }}"
            echo "  Port ${{ secrets.SSH_PORT }}"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  ProxyJump jumphost"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -F ~/.ssh/config" \
            ./publish/ \
            target:/var/www/webapp/

      - name: Service neu starten
        run: |
          ssh -F ~/.ssh/config target "sudo systemctl restart flomi"
