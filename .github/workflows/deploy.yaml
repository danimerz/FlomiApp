name: Build & Deploy Blazor Server App (via Jump Host)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Brahmsnet

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish ./FlomiApp.csproj \
            -c Release \
            --self-contained false \
            -o ./publish \
            -p:TreatWarningsAsErrors=false

      - name: SSH-Key & Konfiguration einrichten
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST_1: ${{ secrets.JUMP_HOST_1 }}
          JUMP_PORT_1: ${{ secrets.JUMP_PORT_1 }}
          JUMP_USER_1: ${{ secrets.JUMP_USER_1 }}
          JUMP_HOST_2: ${{ secrets.JUMP_HOST_2 }}
          JUMP_PORT_2: ${{ secrets.JUMP_PORT_2 }}
          JUMP_USER_2: ${{ secrets.JUMP_USER_2 }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Alle Hosts scannen
          ssh-keyscan -p "$JUMP_PORT_1" "$JUMP_HOST_1" >> ~/.ssh/known_hosts

          # SSH Config mit zweistufigem ProxyJump
          {
            echo "Host jump1"
            echo "  HostName $JUMP_HOST_1"
            echo "  User $JUMP_USER_1"
            echo "  Port $JUMP_PORT_1"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  StrictHostKeyChecking no"
            echo ""
            echo "Host jump2"
            echo "  HostName $JUMP_HOST_2"
            echo "  User $JUMP_USER_2"
            echo "  Port $JUMP_PORT_2"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  ProxyJump jump1"
            echo "  StrictHostKeyChecking no"
            echo ""
            echo "Host target"
            echo "  HostName $SSH_HOST"
            echo "  User $SSH_USER"
            echo "  Port $SSH_PORT"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  ProxyJump jump2"
            echo "  StrictHostKeyChecking no"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

          # Verbindung testen
          ssh -F ~/.ssh/config target "echo verbindung_ok"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -F ~/.ssh/config" \
            ./publish/ \
            target:/var/www/webapp/

      - name: Service neu starten
        run: |
          ssh -F ~/.ssh/config target "sudo systemctl restart flomi"
