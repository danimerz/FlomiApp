name: Build & Deploy Blazor Server App (via Jump Host)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Brahmsnet

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish ./FlomiApp.csproj \
            -c Release \
            --self-contained false \
            -o ./publish \
            -p:TreatWarningsAsErrors=false

      - name: SSH einrichten, Deploy & Restart
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST_1: ${{ secrets.JUMP_HOST_1 }}
          JUMP_PORT_1: ${{ secrets.JUMP_PORT_1 }}
          JUMP_USER_1: ${{ secrets.JUMP_USER_1 }}
          JUMP_HOST_2: ${{ secrets.JUMP_HOST_2 }}
          JUMP_PORT_2: ${{ secrets.JUMP_PORT_2 }}
          JUMP_USER_2: ${{ secrets.JUMP_USER_2 }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p "$JUMP_PORT_1" "$JUMP_HOST_1" >> ~/.ssh/known_hosts

          # Config als Variable, dann schreiben
          CONFIG="Host jump1
          HostName $JUMP_HOST_1
            User $JUMP_USER_1
            Port $JUMP_PORT_1
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          
          Host jump2
            HostName $JUMP_HOST_2
            User $JUMP_USER_2
            Port $JUMP_PORT_2
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump jump1
            StrictHostKeyChecking no
          
          Host target
            HostName $SSH_HOST
            User $SSH_USER
            Port $SSH_PORT
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump jump2
            StrictHostKeyChecking no"
          
                    printf '%s\n' "$CONFIG" > ~/.ssh/config
                    #chmod 600 ~/.ssh/config
          
                    # Prüfen ob Config existiert
                    echo "Config inhalt:"
                    cat ~/.ssh/config
          
                    # Deploy
                    rsync -avz --delete \
                      -e "ssh -F ~/.ssh/config" \
                      ./publish/ \
                      target:/var/www/webapp/
          
                    # Service neu starten
                    ssh -F ~/.ssh/config target "sudo systemctl restart flomi"
