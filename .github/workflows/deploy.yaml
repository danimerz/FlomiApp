name: Build & Deploy Blazor Server App (via Jump Host)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Brahmsnet

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish ./FlomiApp.csproj \
            -c Release \
            --self-contained false \
            -o ./publish \
            -p:TreatWarningsAsErrors=false

      - name: SSH einrichten, Deploy & Restart
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST_1: ${{ secrets.JUMP_HOST_1 }}
          JUMP_PORT_1: ${{ secrets.JUMP_PORT_1 }}
          JUMP_USER_1: ${{ secrets.JUMP_USER_1 }}
          JUMP_HOST_2: ${{ secrets.JUMP_HOST_2 }}
          JUMP_PORT_2: ${{ secrets.JUMP_PORT_2 }}
          JUMP_USER_2: ${{ secrets.JUMP_USER_2 }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p $HOME/.ssh
          chmod 700 $HOME/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > $HOME/.ssh/id_ed25519
          chmod 600 $HOME/.ssh/id_ed25519

          ssh-keyscan -p "$JUMP_PORT_1" "$JUMP_HOST_1" >> $HOME/.ssh/known_hosts

          CONFIG="Host jump1
            HostName $JUMP_HOST_1
            User $JUMP_USER_1
            Port $JUMP_PORT_1
            IdentityFile $HOME/.ssh/id_ed25519
            StrictHostKeyChecking no
          
          Host jump2
            HostName $JUMP_HOST_2
            User $JUMP_USER_2
            Port $JUMP_PORT_2
            IdentityFile $HOME/.ssh/id_ed25519
            ProxyJump jump1
            StrictHostKeyChecking no
          
          Host target
            HostName $SSH_HOST
            User $SSH_USER
            Port $SSH_PORT
            IdentityFile $HOME/.ssh/id_ed25519
            ProxyJump jump2
            StrictHostKeyChecking no"
          
                    printf '%s\n' "$CONFIG" > $HOME/.ssh/config
                    chmod 600 $HOME/.ssh/config
          
                    echo "HOME ist: $HOME"
                    echo "Config existiert: $(ls -la $HOME/.ssh/config)"
          
                    rsync -avz --delete \
                      -e "ssh -F $HOME/.ssh/config" \
                      ./publish/ \
                      target:/var/www/webapp/
          
                    ssh -F $HOME/.ssh/config target "sudo systemctl restart flomi"
