name: Build & Deploy Blazor Server App (via Jump Host)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore & Publish
        run: |
          dotnet restore
          dotnet publish -c Release --self-contained false -o ./publish

      - name: SSH-Key & Konfiguration einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Jump Host + Zielserver zu known_hosts hinzufügen
          ssh-keyscan -p ${{ secrets.JUMP_PORT }} ${{ secrets.JUMP_HOST }} >> ~/.ssh/known_hosts
          ssh -p ${{ secrets.JUMP_PORT }} \
              -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=no \
              ${{ secrets.JUMP_USER }}@${{ secrets.JUMP_HOST }} \
              "ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }}" \
              >> ~/.ssh/known_hosts

          # SSH Config für einfache Nutzung in den Folgeschritten
          cat >> ~/.ssh/config << EOF
          Host jumphost
            HostName ${{ secrets.JUMP_HOST }}
            User ${{ secrets.JUMP_USER }}
            Port ${{ secrets.JUMP_PORT }}
            IdentityFile ~/.ssh/id_ed25519

          Host target
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump jumphost
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -F ~/.ssh/config" \
            ./publish/ \
            target:/var/www/webapp/

      - name: Service neu starten
        run: |
          ssh -F ~/.ssh/config target "sudo systemctl restart flomi"
